[build]
  publish = "site"

# Pretty URLs — let visitors hit /platform instead of /platform.html
[[redirects]]
  from = "/platform"
  to = "/platform.html"
  status = 200

[[redirects]]
  from = "/roi-calculator"
  to = "/roi-calculator.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/team"
  to = "/team.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/webinars"
  to = "/webinars.html"
  status = 200

[[redirects]]
  from = "/publications"
  to = "/publications.html"
  status = 200

[[redirects]]
  from = "/solutions/rare-disease"
  to = "/solutions/rare-disease.html"
  status = 200

[[redirects]]
  from = "/solutions/cancer-genetics"
  to = "/solutions/cancer-genetics.html"
  status = 200

[[redirects]]
  from = "/solutions/health-systems"
  to = "/solutions/health-systems.html"
  status = 200

# Cache headers — long cache for assets, no-cache for HTML
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
