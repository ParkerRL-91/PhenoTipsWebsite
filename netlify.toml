# ---- Pattern catch-alls (handle the 70+ blog posts and speaker-series episodes) ----
# Note: specific routes above are matched first.

[[redirects]]
  from = "/blog/*"
  to = "/webinars.html"
  status = 302       # 302 for now — change to 301 when we add a real blog
  force = true

[[redirects]]
  from = "/speaker-series/*"
  to = "/webinars.html"
  status = 301
  force = true

[[redirects]]
  from = "/press/*"
  to = "/press.html"
  status = 301
  force = true

[[redirects]]
  from = "/casestudies/*"
  to = "/publications.html"
  status = 301
  force = true

[[redirects]]
  from = "/case-studies/*"
  to = "/publications.html"
  status = 301
  force = true

# Cache headers — long cache for assets, no-cache for HTML
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
